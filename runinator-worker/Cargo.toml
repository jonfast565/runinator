[package]
name = "runinator-worker"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4"
tracing = "0.1"
clap = { version = "4.5", features = ["derive", "env"] }
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.18", features = ["v4", "v5", "serde"] }
log-panics = "2.1"
reqwest = { version = "0.13.3", default-features = false, features = ["json", "rustls", "blocking"] }

runinator-comm = { path = "../runinator-comm" }
runinator-plugin = { path = "../runinator-plugin" }
runinator-models = { path = "../runinator-models" }
runinator-utilities = { path = "../runinator-utilities" }
opentelemetry = "0.32"
runinator-api = { path = "../runinator-api" }
runinator-broker = { path = "../runinator-broker" }
runinator-provider-catalog = { path = "../runinator-provider-catalog" }

[features]
kafka = ["runinator-broker/kafka"]
rabbitmq = ["runinator-broker/rabbitmq"]
# enables `--broker-backend ws`, relaying through runinator-ws's /ws/desktop-worker endpoint instead
# of connecting to the broker directly — for a worker that only has network access to the web
# service (e.g. running outside the cluster's trusted network).
ws = ["runinator-broker/ws"]
