[package]
name = "runinator-command-center"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
mime_guess = "2"
reqwest = { version = "0.13.3", default-features = false, features = ["json", "rustls", "multipart"] }
runinator-api = { path = "../../runinator-api" }
runinator-broker = { path = "../../runinator-broker" }
runinator-comm = { path = "../../runinator-comm" }
runinator-models = { path = "../../runinator-models" }
runinator-plugin = { path = "../../runinator-plugin" }
runinator-provider-catalog = { path = "../../runinator-provider-catalog" }
runinator-provider-local-files = { path = "../../runinator-provider-local-files" }
runinator-utilities = { path = "../../runinator-utilities" }
runinator-wdl = { path = "../../runinator-wdl" }
runinator-workflows = { path = "../../runinator-workflows" }
runinator-worker = { path = "../../runinator-worker" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
socket2 = "0.6"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
thiserror = "2.0.18"
tokio = { version = "1", features = ["sync", "fs"] }
url = "2"
uuid = { version = "1.18", features = ["serde"] }
