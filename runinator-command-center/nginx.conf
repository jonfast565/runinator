server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # spa: client-side routing falls back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # api: strip "/api" prefix and forward to runinator-ws.
  location /api/ {
    proxy_pass http://runinator-ws:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # websocket: preserve "/ws/..." path; upgrade headers required.
  location /ws/ {
    proxy_pass http://runinator-ws:8080/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }

  # multipart artifact upload may exceed default size limits.
  client_max_body_size 256m;
}
