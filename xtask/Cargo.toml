[package]
name = "xtask"
version = "0.1.0"
edition = "2024"
publish = false

[[bin]]
name = "xtask"
path = "src/main.rs"

[dependencies]
anyhow = "1"
chrono = "0.4"
clap = { version = "4.5", features = ["derive"] }
regex = "1"
serde = "1"
serde_yaml = "0.9"
walkdir = "2"

runinator-db-cli = { path = "../runinator-db-cli" }
runinator-utilities = { path = "../runinator-utilities" }
