[package]
name = "runinator-ws"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4"
axum = { version = "0.8.9", features = ["ws", "multipart"] }
tower-http = { version = "0.6.2", features = ["cors", "catch-panic"] }
futures = "0.3"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["io"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.5", features = ["derive", "env"] }
env_logger = "0.11"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.18", features = ["v4"] }
log-panics = "2.1"
mime_guess = "2"
reqwest = { version = "0.13.3", default-features = false, features = ["json", "rustls"] }
# used only to install a process-default rustls CryptoProvider at startup (see main.rs).
rustls = { version = "0.23", default-features = false, features = ["ring"] }
utoipa = { version = "5", features = ["axum_extras", "uuid", "chrono"] }
tracing = "0.1"
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16", default-features = false }
opentelemetry = "0.32"

runinator-auth = { path = "../runinator-auth" }
runinator-broker = { path = "../runinator-broker" }
runinator-engine = { path = "../runinator-engine" }
runinator-reducer = { path = "../runinator-reducer" }
runinator-database = { path = "../runinator-database" }
runinator-db-cli = { path = "../runinator-db-cli" }
runinator-models = { path = "../runinator-models" }
runinator-comm = { path = "../runinator-comm" }
runinator-utilities = { path = "../runinator-utilities" }
runinator-workflows = { path = "../runinator-workflows" }
runinator-supervisor = { path = "../runinator-supervisor" }
runinator-provisioner = { path = "../runinator-provisioner" }
runinator-wdl = { path = "../runinator-wdl" }
runinator-provider-catalog = { path = "../runinator-provider-catalog" }

[dev-dependencies]
async-trait = "0.1"
# enable the engine's in-crate test hooks (forced-failure injection, test helpers) so the
# result-consumer/repository integration tests can drive engine behavior. dev-only, so normal
# builds never compile the hooks in.
runinator-engine = { path = "../runinator-engine", features = ["test-support"] }

[features]
kafka = ["runinator-broker/kafka", "runinator-engine/kafka"]
rabbitmq = ["runinator-broker/rabbitmq", "runinator-engine/rabbitmq"]
# enables the real `WsBroker` client, needed to test the /ws/desktop-worker relay end to end.
ws = ["runinator-broker/ws"]
# cloud builds: enable the kube-rs node provisioner backend.
kubernetes = ["runinator-provisioner/kubernetes"]
