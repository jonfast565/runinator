[package]
name = "runinator-ws"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4"
axum = { version = "0.8.9", features = ["ws", "multipart"] }
tower-http = { version = "0.6.2", features = ["cors"] }
futures = "0.3"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["io"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.5", features = ["derive"] }
env_logger = "0.11"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.18", features = ["v4"] }
log-panics = "2.1"
mime_guess = "2"
reqwest = { version = "0.13.3", default-features = false, features = ["json", "rustls"] }

runinator-broker = { path = "../runinator-broker" }
runinator-database = { path = "../runinator-database" }
runinator-models = { path = "../runinator-models" }
runinator-comm = { path = "../runinator-comm" }
runinator-utilities = { path = "../runinator-utilities" }
runinator-workflows = { path = "../runinator-workflows" }
runinator-supervisor = { path = "../runinator-supervisor" }
runinator-wdl = { path = "../runinator-wdl" }

[dev-dependencies]
async-trait = "0.1"

[features]
kafka = ["runinator-broker/kafka"]
rabbitmq = ["runinator-broker/rabbitmq"]
