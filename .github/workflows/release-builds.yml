name: Release Builds

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x64
          - os: macos-latest
            asset_suffix: macos-x64
          - os: windows-latest
            asset_suffix: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: runinator-command-center/pnpm-lock.yaml

      - name: Install Command Center dependencies
        working-directory: runinator-command-center
        run: pnpm install --frozen-lockfile

      - name: Install Linux Tauri prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Set up MSVC toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build backend services
        run: cargo build --workspace --exclude runinator-command-center --release

      - name: Build Command Center
        working-directory: runinator-command-center
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/runinator-command-center/src-tauri/target
        run: pnpm tauri build

      - name: Install cargo-packager (macOS)
        if: runner.os == 'macOS'
        run: cargo install cargo-packager --version 0.11.8 --locked

      - name: Bundle backend apps (macOS)
        if: runner.os == 'macOS'
        run: scripts/package-macos-backend-apps.sh --release --skip-build --out-dir target/backend-apps

      - name: Package artifacts
        shell: pwsh
        run: |
          $distRoot = Join-Path $PWD "dist"
          $bundleName = "Runinator-${{ matrix.asset_suffix }}"
          $bundleDir = Join-Path $distRoot $bundleName
          $releaseDir = Join-Path $PWD "target/release"

          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null

          $rustBins = @(
            "runinator-desktop-agent",
            "runinator-waker",
            "runinator-worker",
            "runinatorctl",
            "runinator-ws",
            "runinator-broker",
            "runinator-supervisor"
          )

          foreach ($bin in $rustBins) {
            $fileName = if ($env:RUNNER_OS -eq "Windows") { "$bin.exe" } else { $bin }
            $source = Join-Path $releaseDir $fileName
            if (Test-Path $source) {
              Copy-Item -Path $source -Destination (Join-Path $bundleDir $fileName) -Force
            } else {
              throw "Missing release binary: $source"
            }
          }

          if ($env:RUNNER_OS -eq "macOS") {
            $backendAppsDir = Join-Path $PWD "target/backend-apps"
            if (Test-Path $backendAppsDir) {
              $backendBundleDir = Join-Path $bundleDir "backend-apps"
              New-Item -ItemType Directory -Path $backendBundleDir -Force | Out-Null

              Get-ChildItem -Path $backendAppsDir -Filter "*.app" -Directory -Recurse | ForEach-Object {
                Copy-Item -Path $_.FullName -Destination (Join-Path $backendBundleDir $_.Name) -Recurse -Force
              }
            } else {
              Write-Warning "Backend app bundle directory was not found at $backendAppsDir"
            }
          }

          $pluginName = switch ($env:RUNNER_OS) {
            "Windows" { "runinator_plugin_console.dll" }
            "macOS" { "libruninator_plugin_console.dylib" }
            default { "libruninator_plugin_console.so" }
          }
          $pluginPath = Join-Path $releaseDir $pluginName
          if (Test-Path $pluginPath) {
            Copy-Item -Path $pluginPath -Destination (Join-Path $bundleDir $pluginName) -Force
          } else {
            Write-Warning "Plugin not found at $pluginPath"
          }

          $configSource = Join-Path $PWD "runinator-supervisor.json"
          if (Test-Path $configSource) {
            Copy-Item -Path $configSource -Destination (Join-Path $bundleDir "runinator-supervisor.json") -Force
          }

          $readmeSource = Join-Path $PWD "README.md"
          if (Test-Path $readmeSource) {
            Copy-Item -Path $readmeSource -Destination (Join-Path $bundleDir "README.md") -Force
          }

          $tauriBundleCandidates = @(
            (Join-Path $PWD "runinator-command-center/src-tauri/target/release/bundle"),
            (Join-Path $PWD "target/release/bundle")
          )
          $tauriBundleDir = $tauriBundleCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $tauriBundleDir) {
            throw "Tauri bundle directory was not found. Checked: $($tauriBundleCandidates -join ', ')"
          }

          $commandCenterDir = Join-Path $bundleDir "runinator-command-center"
          New-Item -ItemType Directory -Path $commandCenterDir -Force | Out-Null

          Get-ChildItem -Path $tauriBundleDir | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination (Join-Path $commandCenterDir $_.Name) -Recurse -Force
          }

          $copiedCommandCenterItems = Get-ChildItem -Path $commandCenterDir -Recurse
          if (-not $copiedCommandCenterItems) {
            throw "No Runinator Command Center artifacts were copied from $tauriBundleDir"
          }

          if ($env:RUNNER_OS -eq "Windows") {
            $desktopArtifacts = $copiedCommandCenterItems | Where-Object {
              -not $_.PSIsContainer -and $_.Extension -in @(".exe", ".msi")
            }
          } elseif ($env:RUNNER_OS -eq "macOS") {
            $desktopArtifacts = $copiedCommandCenterItems | Where-Object {
              ($_.PSIsContainer -and $_.Name.EndsWith(".app")) -or (-not $_.PSIsContainer -and $_.Extension -eq ".dmg")
            }
          } else {
            $desktopArtifacts = $copiedCommandCenterItems | Where-Object {
              -not $_.PSIsContainer -and $_.Extension -in @(".AppImage", ".deb", ".rpm")
            }
          }

          if (-not $desktopArtifacts) {
            throw "No platform desktop artifacts were found in $commandCenterDir"
          }

          $archivePath = Join-Path $distRoot "$bundleName.zip"
          if (Test-Path $archivePath) {
            Remove-Item -Path $archivePath -Force
          }
          Compress-Archive -Path (Join-Path $bundleDir "*") -DestinationPath $archivePath -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runinator-${{ matrix.asset_suffix }}
          path: dist/Runinator-${{ matrix.asset_suffix }}.zip

  release:
    name: Publish Release Assets
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Runinator-*
          merge-multiple: true
          path: dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
