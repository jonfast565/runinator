[package]
name = "runinator-utilities"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4"
fern = "0.7"
colored = "3.1.1"
env_logger = "0.11"
humantime = "2.3.0"
tokio = { version = "1", features = ["full"] }
csv = "1"
rust_xlsxwriter = "0.94.1"
log-panics = "2.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
zip = { version = "7.2", default-features = false }

runinator-models = { path = "../runinator-models" }
