apiVersion: v1
kind: ConfigMap
metadata:
  name: runinator-otel-collector-config
  namespace: runinator
  labels:
    app.kubernetes.io/part-of: runinator
    app.kubernetes.io/component: observability
data:
  config.yaml: |
    # receive otlp from every runinator binary over grpc (4317) and http/protobuf (4318). the rust
    # services use otlp http/protobuf, so 4318 is the one they hit; grpc is left on for other tools.
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      # traces -> jaeger all-in-one (its own otlp grpc receiver), viewable in the jaeger ui.
      otlp/jaeger:
        endpoint: runinator-jaeger.runinator.svc.cluster.local:4317
        tls:
          insecure: true
      # metrics -> prometheus text exposition on :8889 for scraping or ad-hoc curl.
      prometheus:
        endpoint: 0.0.0.0:8889
      # logs -> loki's native otlp ingestion endpoint (loki 3.x+), so structured fields like
      # trace_id/run_id/error_code set by the rust binaries stay queryable via logql in grafana
      # instead of only living in kubectl logs.
      otlphttp/loki:
        endpoint: http://runinator-loki.runinator.svc.cluster.local:3100/otlp
        tls:
          insecure: true
      # a copy of everything -> the collector's own stdout for quick kubectl logs viewing.
      debug:
        verbosity: detailed
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/jaeger, debug]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus, debug]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/loki, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-otel-collector
  namespace: runinator
  labels:
    app.kubernetes.io/part-of: runinator
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runinator-otel-collector
  template:
    metadata:
      labels:
        app: runinator-otel-collector
        app.kubernetes.io/part-of: runinator
        app.kubernetes.io/component: observability
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector:0.119.0
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: prometheus
              containerPort: 8889
            # the collector's own telemetry (pipeline throughput, queue sizes).
            - name: self-metrics
              containerPort: 8888
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: runinator-otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: runinator-otel-collector
  namespace: runinator
  labels:
    app.kubernetes.io/part-of: runinator
    app.kubernetes.io/component: observability
spec:
  selector:
    app: runinator-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: prometheus
      port: 8889
      targetPort: prometheus
    - name: self-metrics
      port: 8888
      targetPort: self-metrics
