apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-jaeger
  namespace: runinator
  labels:
    app.kubernetes.io/part-of: runinator
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runinator-jaeger
  template:
    metadata:
      labels:
        app: runinator-jaeger
        app.kubernetes.io/part-of: runinator
        app.kubernetes.io/component: observability
    spec:
      containers:
        - name: jaeger
          # all-in-one keeps traces in memory; fine for viewing, not for durable storage. swap for a
          # backed deployment (badger/elasticsearch/cassandra) if you need retention.
          image: jaegertracing/all-in-one:1.62.0
          env:
            # accept otlp directly on 4317/4318 so the collector can forward traces here.
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - name: ui
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: runinator-jaeger
  namespace: runinator
  labels:
    app.kubernetes.io/part-of: runinator
    app.kubernetes.io/component: observability
spec:
  selector:
    app: runinator-jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: ui
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
