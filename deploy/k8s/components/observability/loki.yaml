apiVersion: v1
kind: ConfigMap
metadata:
  name: runinator-loki-config
  namespace: runinator
  labels:
    app.kubernetes.io/part-of: runinator
    app.kubernetes.io/component: observability
data:
  # single-binary, filesystem-backed loki matching the emptyDir/single-replica pattern used for
  # prometheus in this component: fine for viewing recent logs, not for long retention.
  local-config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: 168h
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-loki
  namespace: runinator
  labels:
    app.kubernetes.io/part-of: runinator
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runinator-loki
  template:
    metadata:
      labels:
        app: runinator-loki
        app.kubernetes.io/part-of: runinator
        app.kubernetes.io/component: observability
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.3.0
          args:
            - "-config.file=/etc/loki/local-config.yaml"
          ports:
            - name: http
              containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
              readOnly: true
            - name: data
              mountPath: /loki
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: runinator-loki-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: runinator-loki
  namespace: runinator
  labels:
    app.kubernetes.io/part-of: runinator
    app.kubernetes.io/component: observability
spec:
  selector:
    app: runinator-loki
  ports:
    - name: http
      port: 3100
      targetPort: http
