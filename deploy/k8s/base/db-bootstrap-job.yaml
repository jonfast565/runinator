# Standalone bootstrap Job. This file is not included in the default kustomize
# base because Job pod templates are immutable across image tag changes. The
# runinator-ws Deployment already runs an initContainer with the same image on
# every pod start, so this Job is for out-of-band ops use.
#
# Delete + re-apply to re-run:
#   kubectl -n runinator delete job runinator-db-bootstrap --ignore-not-found
#   kubectl apply -f deploy/k8s/base/db-bootstrap-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: runinator-db-bootstrap
  namespace: runinator
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: runinator-db-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: runinator-bootstrap:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--database"
            - "postgres"
            - "--database-url"
            - "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
          envFrom:
            - configMapRef:
                name: runinator-common
            - secretRef:
                name: runinator-postgres-secret
            - secretRef:
                name: runinator-app-secret
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
