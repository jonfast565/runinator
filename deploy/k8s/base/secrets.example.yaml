---
apiVersion: v1
kind: Secret
metadata:
  name: runinator-app-secret
  namespace: runinator
type: Opaque
stringData:
  # 32-byte base64 key for credential store encryption.
  RUNINATOR_CREDENTIAL_KEY: "REPLACE_ME"
  # optional rotation overlap: comma-separated prior credential keys still accepted on decrypt while
  # rotating RUNINATOR_CREDENTIAL_KEY. set the old key here, redeploy ws, POST /credentials/reencrypt,
  # then clear this to retire the old key. read by the ws deployment only.
  # RUNINATOR_CREDENTIAL_KEY_PREVIOUS: "OLD_KEY"
  # seeds an admin on first bootstrap (only when no users exist yet). required to log in once
  # RUNINATOR_AUTH_ENABLED=true on the ws deployment. format is "username:password".
  RUNINATOR_AUTH_BOOTSTRAP_ADMIN: "admin:REPLACE_ME"
  # optional break-glass: set "true" to make bootstrap reset RUNINATOR_AUTH_BOOTSTRAP_ADMIN's password
  # on every run even when users already exist (recovers a locked-out admin). leave unset normally.
  # RUNINATOR_AUTH_BOOTSTRAP_ADMIN_FORCE: "false"
  # raw service api key (`<prefix>.<secret>`) seeded on bootstrap and presented by worker/waker/
  # pack-import for non-interactive auth-enabled local/dev calls.
  RUNINATOR_AUTH_BOOTSTRAP_SERVICE_API_KEY: "REPLACE_ME"
  RUNINATOR_AUTH_BOOTSTRAP_SERVICE_API_KEY_NAME: "cluster-services"
  # optional: pin the jwt signing secret. omit to let bootstrap generate + persist a random one.
  # RUNINATOR_AUTH_JWT_SECRET: "REPLACE_ME"
  # optional rotation overlap: the previous jwt signing secret, still accepted on verify so live
  # tokens stay valid. set it to the pre-rotation RUNINATOR_AUTH_JWT_SECRET while rotating, then clear
  # it (bootstrap deletes the slot) after the access-token TTL elapses. read by the bootstrap step.
  # RUNINATOR_AUTH_JWT_SECRET_PREVIOUS: "OLD_SECRET"
