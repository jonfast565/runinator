# Template only — do NOT apply directly with these values.
# Copy this file outside the repo, replace placeholders with real secrets, and apply manually:
#   kubectl apply -f my-secrets.yaml
#
# These Secrets are referenced by name from the base manifests.
---
apiVersion: v1
kind: Secret
metadata:
  name: runinator-postgres-secret
  namespace: runinator
type: Opaque
stringData:
  POSTGRES_USER: "runinator"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "runinator"
---
apiVersion: v1
kind: Secret
metadata:
  name: runinator-rabbitmq-secret
  namespace: runinator
type: Opaque
stringData:
  RABBIT_USER: "runinator"
  RABBIT_PASS: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: runinator-app-secret
  namespace: runinator
type: Opaque
stringData:
  # 32-byte base64 key for credential store encryption.
  RUNINATOR_CREDENTIAL_KEY: "REPLACE_ME"
  # seeds an admin on first bootstrap (only when no users exist yet). required to log in once
  # RUNINATOR_AUTH_ENABLED=true on the ws deployment. format is "username:password".
  RUNINATOR_AUTH_BOOTSTRAP_ADMIN: "admin:REPLACE_ME"
  # optional: pin the jwt signing secret. omit to let bootstrap generate + persist a random one.
  # RUNINATOR_AUTH_JWT_SECRET: "REPLACE_ME"
