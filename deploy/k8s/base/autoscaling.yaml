# Horizontal autoscaling for the load-balanced services. Each Deployment is safe to scale:
# ws competes on durable claims/leases and fans UI events out over the broker; workers and wakers
# are broker competing-consumers; the frontend is stateless nginx. Requires metrics-server.
#
# minReplicas here are the scaling-ready defaults; the local overlay pins everything to 1.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: runinator-ws
  namespace: runinator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: runinator-ws
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: runinator-worker
  namespace: runinator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: runinator-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: runinator-waker
  namespace: runinator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: runinator-waker
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: runinator-command-center-web
  namespace: runinator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: runinator-command-center-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
