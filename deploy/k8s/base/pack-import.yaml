apiVersion: batch/v1
kind: Job
metadata:
  name: runinator-pack-import
  namespace: runinator
spec:
  # runinatorctl runs a one-shot pack import that fails hard if runinator-ws is
  # not yet serving. ws waits on its own db-bootstrap init container and postgres,
  # so it can take ~30s+ to come up. a higher backoffLimit lets the OnFailure
  # restart loop absorb that startup race; activeDeadlineSeconds bounds total runtime.
  backoffLimit: 12
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: runinator-pack-import
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pack-import
          image: runinator-ctl:dev
          imagePullPolicy: IfNotPresent
          command: ["runinatorctl"]
          args:
            - "--api-base-url"
            - "$(WS_API_BASE_URL)"
            - "workflows"
            - "apply"
            - "/home/runinator/.runinator/workflows/sdlc.wdlp"
          envFrom:
            - configMapRef:
                name: runinator-common
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
