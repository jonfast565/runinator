# Workers run as a StatefulSet behind a headless Service so each pod keeps a stable ordinal identity
# (runinator-worker-0, -1, ...) and DNS name across restarts/reschedules, rather than the random
# hash + churning IP a Deployment hands out. The stable pod name feeds both the broker client id and
# a deterministic worker id, so a restarted pod reclaims its prior replica identity instead of
# leaving an orphan row (the ws replica reaper retires any that truly disappear on scale-down).
apiVersion: v1
kind: Service
metadata:
  name: runinator-worker
  namespace: runinator
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: runinator-worker
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: runinator-worker
  namespace: runinator
spec:
  serviceName: runinator-worker
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: runinator-worker
  template:
    metadata:
      labels:
        app: runinator-worker
    spec:
      initContainers:
        - name: plugin-stage
          image: runinator-worker:dev
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - "cp -R /home/runinator/.runinator/plugins/. /opt/runinator/plugins/"
          volumeMounts:
            - name: plugins
              mountPath: /opt/runinator/plugins
      containers:
        - name: worker
          image: runinator-worker:dev
          imagePullPolicy: IfNotPresent
          command: ["runinator-worker"]
          args:
            - "--dll-path"
            - "/opt/runinator/plugins"
            - "--broker-backend"
            - "rabbitmq"
            - "--broker-endpoint"
            - "amqp://$(RABBIT_USER):$(RABBIT_PASS)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)/%2f"
            - "--broker-client-id"
            - "runinator-worker-$(POD_NAME)"
            - "--worker-id"
            - "$(POD_NAME)"
            - "--advertise-host"
            - "$(POD_NAME).runinator-worker.runinator.svc.cluster.local"
            - "--max-concurrent-actions"
            - "4"
            - "--api-base-url"
            - "$(WS_API_BASE_URL)"
          envFrom:
            - configMapRef:
                name: runinator-common
            - secretRef:
                name: runinator-rabbitmq-secret
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: plugins
              mountPath: /opt/runinator/plugins
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: plugins
          emptyDir: {}
