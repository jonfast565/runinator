# Workers run as a plain Deployment: they are stateless broker competing-consumers with no
# persistent volumes (the plugins dir is an emptyDir repopulated by the init container each start),
# and broker ack/redelivery handles failover regardless of pod identity. The pod name is still folded
# into a deterministic worker id (Uuid::new_v5) so a pod keeps a coherent replica identity for its
# lifetime; the ws replica reaper marks gone pods offline and purges long-stale rows.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-worker
  namespace: runinator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: runinator-worker
  template:
    metadata:
      labels:
        app: runinator-worker
    spec:
      initContainers:
        - name: plugin-stage
          image: runinator-worker:dev
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - "cp -R /home/runinator/.runinator/plugins/. /opt/runinator/plugins/"
          volumeMounts:
            - name: plugins
              mountPath: /opt/runinator/plugins
      containers:
        - name: worker
          image: runinator-worker:dev
          imagePullPolicy: IfNotPresent
          command: ["runinator-worker"]
          args:
            - "--dll-path"
            - "/opt/runinator/plugins"
            - "--broker-backend"
            - "rabbitmq"
            - "--broker-endpoint"
            - "amqp://$(RABBIT_USER):$(RABBIT_PASS)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)/%2f"
            - "--broker-client-id"
            - "runinator-worker-$(POD_NAME)"
            - "--worker-id"
            - "$(POD_NAME)"
            - "--max-concurrent-actions"
            - "4"
            - "--api-base-url"
            - "$(WS_API_BASE_URL)"
          envFrom:
            - configMapRef:
                name: runinator-common
            - secretRef:
                name: runinator-rabbitmq-secret
          env:
            - name: RUNINATOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: runinator-app-secret
                  key: RUNINATOR_AUTH_BOOTSTRAP_SERVICE_API_KEY
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: plugins
              mountPath: /opt/runinator/plugins
              readOnly: true
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test $(find /tmp/runinator-worker-liveness -mmin -1 2>/dev/null | wc -l) -eq 1"
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: plugins
          emptyDir: {}
