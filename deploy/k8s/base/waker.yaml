apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-waker
  namespace: runinator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: runinator-waker
  template:
    metadata:
      labels:
        app: runinator-waker
    spec:
      containers:
        - name: waker
          image: runinator-waker:dev
          imagePullPolicy: IfNotPresent
          command: ["runinator-waker"]
          args:
            - "--waker-id"
            - "$(POD_NAME)"
            - "--broker-backend"
            - "rabbitmq"
            - "--broker-endpoint"
            - "amqp://$(RABBIT_USER):$(RABBIT_PASS)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)/%2f"
            - "--broker-client-id"
            - "runinator-waker-$(POD_NAME)"
          envFrom:
            - configMapRef:
                name: runinator-common
            - secretRef:
                name: runinator-rabbitmq-secret
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
