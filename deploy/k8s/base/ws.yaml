apiVersion: v1
kind: Service
metadata:
  name: runinator-ws
  namespace: runinator
spec:
  selector:
    app: runinator-ws
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-ws
  namespace: runinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runinator-ws
  template:
    metadata:
      labels:
        app: runinator-ws
    spec:
      initContainers:
        - name: db-migrate
          image: runinator-migration:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--database"
            - "postgres"
            - "--database-url"
            - "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
          envFrom:
            - configMapRef:
                name: runinator-common
            - secretRef:
                name: runinator-postgres-secret
      containers:
        - name: ws
          image: runinator-ws:dev
          imagePullPolicy: IfNotPresent
          command: ["runinator-ws"]
          args:
            - "--database"
            - "postgres"
            - "--database-url"
            - "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - "--port"
            - "8080"
            - "--disable-gossip"
            - "--broker-backend"
            - "rabbitmq"
            - "--broker-endpoint"
            - "amqp://$(RABBIT_USER):$(RABBIT_PASS)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)/%2f"
          envFrom:
            - configMapRef:
                name: runinator-common
            - secretRef:
                name: runinator-postgres-secret
            - secretRef:
                name: runinator-rabbitmq-secret
            - secretRef:
                name: runinator-app-secret
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
