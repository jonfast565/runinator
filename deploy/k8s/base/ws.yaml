apiVersion: v1
kind: Service
metadata:
  name: runinator-ws
  namespace: runinator
spec:
  selector:
    app: runinator-ws
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-ws
  namespace: runinator
spec:
  # multi-replica safe: durable claims/leases (FOR UPDATE SKIP LOCKED), shared-group result/ingress
  # consumers, broker-deduped wakes, and broker fan-out of UI events. HPA manages the live count.
  replicas: 2
  selector:
    matchLabels:
      app: runinator-ws
  template:
    metadata:
      labels:
        app: runinator-ws
    spec:
      serviceAccountName: runinator-ws
      initContainers:
        - name: db-bootstrap
          image: runinator-bootstrap:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--database"
            - "postgres"
            - "--database-url"
            - "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
          envFrom:
            - configMapRef:
                name: runinator-common
            - secretRef:
                name: runinator-postgres-secret
            - secretRef:
                name: runinator-app-secret
      containers:
        - name: ws
          image: runinator-ws:dev
          imagePullPolicy: IfNotPresent
          command: ["runinator-ws"]
          args:
            - "--database"
            - "postgres"
            - "--database-url"
            - "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - "--port"
            - "8080"
            - "--instance-id"
            - "$(POD_NAME)"
            - "--advertise-host"
            - "runinator-ws.runinator.svc.cluster.local"
            - "--disable-gossip"
            - "--broker-backend"
            - "rabbitmq"
            - "--broker-endpoint"
            - "amqp://$(RABBIT_USER):$(RABBIT_PASS)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)/%2f"
          env:
            # gate the HTTP API behind login + api keys. the jwt signing secret is managed in the db
            # (load_jwt_secret) and shared across replicas; only the toggle lives here.
            - name: RUNINATOR_AUTH_ENABLED
              value: "true"
            # on-demand node provisioning via the kubernetes backend. requires the ws image built
            # with `--features kubernetes` and the runinator-ws-provisioner RBAC role.
            - name: RUNINATOR_PROVISIONER_K8S_ENABLED
              value: "true"
            - name: RUNINATOR_PROVISIONER_K8S_NAMESPACE
              value: "runinator"
            - name: RUNINATOR_PROVISIONER_K8S_WORKER_DEPLOYMENT
              value: "runinator-worker"
            - name: RUNINATOR_PROVISIONER_K8S_WAKER_DEPLOYMENT
              value: "runinator-waker"
            - name: RUNINATOR_PROVISIONER_K8S_WS_DEPLOYMENT
              value: "runinator-ws"
            # Optional only for replication-aware Postgres clusters with safe connection routing
            # such as an operator-managed primary/replica setup fronted by PgBouncer.
            # - name: RUNINATOR_PROVISIONER_K8S_POSTGRES_STATEFULSET
            #   value: "runinator-postgres"
            # - name: RUNINATOR_PROVISIONER_K8S_POSTGRES_SCALE_OUT_ENABLED
            #   value: "true"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: runinator-common
            - secretRef:
                name: runinator-postgres-secret
            - secretRef:
                name: runinator-rabbitmq-secret
            - secretRef:
                name: runinator-app-secret
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
