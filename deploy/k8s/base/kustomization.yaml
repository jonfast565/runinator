apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: runinator

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: runinator

resources:
  - namespace.yaml
  - common-config.yaml
  - postgres.yaml
  - rabbitmq.yaml
  - ws.yaml
  - waker.yaml
  - worker.yaml
  - importer.yaml
  - command-center.yaml

images:
  - name: runinator-ws
    newTag: dev
  - name: runinator-waker
    newTag: dev
  - name: runinator-worker
    newTag: dev
  - name: runinator-importer
    newTag: dev
  - name: runinator-migration
    newTag: dev
  - name: runinator-command-center-web
    newTag: dev
