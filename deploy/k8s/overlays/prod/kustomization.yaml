apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: runinator

resources:
  - ../../base

# Point image names at your real registry. Override `newName` and `newTag`
# (e.g. via `kustomize edit set image runinator-ws=registry.example.com/runinator-ws:1.2.3`).
images:
  - name: runinator-ws
    newName: REPLACE_REGISTRY/runinator-ws
    newTag: latest
  - name: runinator-background
    newName: REPLACE_REGISTRY/runinator-background
    newTag: latest
  - name: runinator-waker
    newName: REPLACE_REGISTRY/runinator-waker
    newTag: latest
  - name: runinator-worker
    newName: REPLACE_REGISTRY/runinator-worker
    newTag: latest
  - name: runinator-archiver
    newName: REPLACE_REGISTRY/runinator-archiver
    newTag: latest
  - name: runinator-ctl
    newName: REPLACE_REGISTRY/runinator-ctl
    newTag: latest
  - name: runinator-bootstrap
    newName: REPLACE_REGISTRY/runinator-bootstrap
    newTag: latest
  - name: runinator-command-center
    newName: REPLACE_REGISTRY/runinator-command-center
    newTag: latest

patches:
  - path: resources-patch.yaml
  - path: storage-class-patch.yaml
  - path: autoscaling-patch.yaml
  - path: common-config-patch.yaml
