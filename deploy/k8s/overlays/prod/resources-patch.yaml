# Production resource sizing. Adjust per cluster capacity.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-ws
  namespace: runinator
spec:
  template:
    spec:
      containers:
        - name: ws
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-waker
  namespace: runinator
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: waker
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-worker
  namespace: runinator
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: runinator-postgres
  namespace: runinator
spec:
  template:
    spec:
      containers:
        - name: postgres
          # server tuning passed to the `postgres` command (the official image runs CMD `postgres`,
          # so it must be repeated here or the entrypoint loses it). max_connections is sized to the
          # per-pod pool cap x peak pods: RUNINATOR_DB_MAX_CONNECTIONS=10 (see common-config-patch)
          # x ~23 pods at peak ws scale = ~230, plus headroom for the db-bootstrap job and admin
          # sessions -> 300. If you raise the pool cap or ws maxReplicas, raise this in lockstep and
          # confirm it fits available memory (each connection reserves work_mem-sized buffers).
          #
          # PgBouncer: a single Postgres does not scale connections indefinitely, and bumping
          # max_connections trades memory for headroom rather than fixing the ceiling. For higher
          # fan-out (many ws/background replicas, or a smaller Postgres), front this StatefulSet with
          # PgBouncer in transaction-pooling mode: point the app's --database-url at the PgBouncer
          # service, keep PgBouncer's server-side pool small (e.g. default_pool_size ~ 25) so actual
          # Postgres connections stay low, and then RUNINATOR_DB_MAX_CONNECTIONS bounds client-side
          # checkouts against PgBouncer rather than against Postgres directly.
          args:
            - "postgres"
            - "-c"
            - "max_connections=300"
            - "-c"
            - "shared_buffers=1GB"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4000m"
              memory: "4Gi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: runinator-rabbitmq
  namespace: runinator
spec:
  template:
    spec:
      containers:
        - name: rabbitmq
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
