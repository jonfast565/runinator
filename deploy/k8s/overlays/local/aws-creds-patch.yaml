# Mount the host's AWS config directory into each worker pod so aws sso login
# cache and profile files are visible at the default home-directory location.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: runinator-worker
  namespace: runinator
spec:
  template:
    spec:
      containers:
        - name: worker
          volumeMounts:
            - name: aws-config
              mountPath: /home/runinator/.aws
              readOnly: true
      volumes:
        - name: aws-config
          hostPath:
            path: /Users/jfast/.aws
            type: Directory
