# Mount a node-local AWS config directory into each worker pod so aws sso
# cache and profile files are visible at the default home-directory location.
# Point the node path at the developer's real ~/.aws through the local cluster
# driver's mount or symlink mechanism before applying this overlay.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: runinator-worker
  namespace: runinator
spec:
  template:
    spec:
      containers:
        - name: worker
          volumeMounts:
            - name: aws-config
              mountPath: /home/runinator/.aws
              readOnly: true
      volumes:
        - name: aws-config
          hostPath:
            path: /var/runinator/aws
            type: Directory
