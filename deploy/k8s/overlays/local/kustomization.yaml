apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: runinator

resources:
  - ../../base
  - local-secrets.yaml

# Single-node / local cluster (k3d, minikube, kind). PVCs use the cluster's
# default StorageClass (e.g. local-path on k3d). If your local cluster has no
# default storage provisioner, see overlays/local/README.md for a hostPath
# fallback patch.
# Local keeps every service horizontally scalable (base defaults to 2 replicas each); it only trims
# resource requests and HPA upper bounds so a laptop-class single-node cluster can still run the
# multi-replica stack. HPAs need metrics-server; without it the services simply stay at their
# Deployment replica count (still > 1) and `kubectl scale` continues to work.
patches:
  - path: resources-patch.yaml
  - path: autoscaling-patch.yaml
  - path: aws-creds-patch.yaml
  - path: claude-creds-patch.yaml

# Default image refs are local dev tags. build.ps1 -DeployKube renders matching
# tags into a copied overlay under target/k8s-render before applying.
images:
  - name: runinator-ws
    newName: runinator-ws
    newTag: dev
  - name: runinator-waker
    newName: runinator-waker
    newTag: dev
  - name: runinator-worker
    newName: runinator-worker
    newTag: dev
  - name: runinator-archiver
    newName: runinator-archiver
    newTag: dev
  - name: runinator-ctl
    newName: runinator-ctl
    newTag: dev
  - name: runinator-bootstrap
    newName: runinator-bootstrap
    newTag: dev
  - name: runinator-command-center
    newName: runinator-command-center
    newTag: dev
