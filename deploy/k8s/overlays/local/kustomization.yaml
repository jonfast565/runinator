apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: runinator

resources:
  - ../../base
  - local-secrets.yaml

# OpenTelemetry collector + Jaeger trace UI, and point the services at the collector. View traces at
# http://localhost:16686 after `kubectl -n runinator port-forward svc/runinator-jaeger 16686:16686`.
# See components/observability/kustomization.yaml for metrics/logs viewing. Drop this line to disable.
components:
  - ../../components/observability

# Single-node / local cluster (k3d, minikube, kind). PVCs use the cluster's
# default StorageClass (e.g. local-path on k3d). If your local cluster has no
# default storage provisioner, see overlays/local/README.md for a hostPath
# fallback patch.
# Local keeps every service horizontally scalable (base defaults to 2 replicas each); it only trims
# resource requests and HPA upper bounds so a laptop-class single-node cluster can still run the
# multi-replica stack. HPAs need metrics-server; without it the services simply stay at their
# Deployment replica count (still > 1) and `kubectl scale` continues to work.
patches:
  - path: resources-patch.yaml
  - path: autoscaling-patch.yaml
  - path: aws-creds-patch.yaml
  - path: claude-creds-patch.yaml
  # Drop archiver output onto the real filesystem instead of an ephemeral PVC.
  # The base archiver declares a single volume (archive-data), so replacing
  # volumes/0 swaps its source to a node-local hostPath; the archiver keeps
  # writing jsonl.gz files to /var/lib/runinator/archive and they land on the
  # host. Point /var/runinator/archive at your real ~/.runinator through the
  # local cluster driver's mount or symlink mechanism before applying.
  # DirectoryOrCreate lets the pod start even when no such mount exists.
  - target: { kind: Deployment, name: runinator-archiver }
    patch: |
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: archive-data
          hostPath:
            path: /var/runinator/archive
            type: DirectoryOrCreate
  # the base PVC is no longer referenced; drop it so the local cluster does not
  # provision an unused ReadWriteOnce claim.
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: runinator-archive-data
        namespace: runinator

# Default image refs are local dev tags. `xtask k8s deploy` renders matching
# tags into a copied overlay under target/k8s-render before applying.
images:
  - name: runinator-ws
    newName: runinator-ws
    newTag: dev
  - name: runinator-waker
    newName: runinator-waker
    newTag: dev
  - name: runinator-worker
    newName: runinator-worker
    newTag: dev
  - name: runinator-archiver
    newName: runinator-archiver
    newTag: dev
  - name: runinator-ctl
    newName: runinator-ctl
    newTag: dev
  - name: runinator-bootstrap
    newName: runinator-bootstrap
    newTag: dev
  - name: runinator-command-center
    newName: runinator-command-center
    newTag: dev
