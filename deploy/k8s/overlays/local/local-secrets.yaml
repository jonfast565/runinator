# local development credentials only. Do not reuse these values in shared clusters.
---
apiVersion: v1
kind: Secret
metadata:
  name: runinator-postgres-secret
  namespace: runinator
type: Opaque
stringData:
  POSTGRES_USER: "runinator"
  POSTGRES_PASSWORD: "runinator"
  POSTGRES_DB: "runinator"
---
apiVersion: v1
kind: Secret
metadata:
  name: runinator-rabbitmq-secret
  namespace: runinator
type: Opaque
stringData:
  RABBIT_USER: "runinator"
  RABBIT_PASS: "runinator"
---
apiVersion: v1
kind: Secret
metadata:
  name: runinator-app-secret
  namespace: runinator
type: Opaque
stringData:
  RUNINATOR_CREDENTIAL_KEY: "runinator-local-development-key"
  # seeds an admin on first bootstrap so the login page is usable in local dev.
  RUNINATOR_AUTH_BOOTSTRAP_ADMIN: "admin:admin"
  RUNINATOR_AUTH_BOOTSTRAP_SERVICE_API_KEY: "localk8s.runinator-local-k8s-service-key"
  RUNINATOR_AUTH_BOOTSTRAP_SERVICE_API_KEY_NAME: "local-k8s-services"
