apiVersion: v1
kind: Service
metadata:
  name: runinator-command-center-flutter
  namespace: runinator
spec:
  selector:
    app: runinator-command-center-flutter
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-command-center-flutter
  namespace: runinator
spec:
  # stateless nginx; it proxies /api and /ws to the runinator-ws Service (kube-proxy load-balanced).
  # single replica: this is the in-progress flutter web port, deployed for testing rather than
  # production traffic. no Ingress on purpose, to avoid colliding with the vue command-center's
  # catch-all "/" route; reach it with scripts/port-forward-command-center-flutter.sh.
  replicas: 1
  selector:
    matchLabels:
      app: runinator-command-center-flutter
  template:
    metadata:
      labels:
        app: runinator-command-center-flutter
    spec:
      containers:
        - name: command-center-flutter
          image: runinator-command-center-flutter:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
