# Mount a node-local Claude config directory into the ws, waker, and worker pods so the
# `claude` binary invoked by the AI command (runinator-provider-ai) sees its config and
# credentials at the default home-directory location (/home/runinator/.claude).
# Point the node path at the developer's real ~/.claude through the local cluster driver's
# mount or symlink mechanism before applying this overlay. DirectoryOrCreate lets the pod
# start with an empty dir when no such mount exists (e.g. a kind node without extraMounts)
# instead of hanging on a failed hostPath type check.
# Mounted read-write (not readOnly like the aws patch) because Claude Code writes session
# and project state and refreshes its OAuth token in this directory.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-worker
  namespace: runinator
spec:
  template:
    spec:
      containers:
        - name: worker
          volumeMounts:
            - name: claude-config
              mountPath: /home/runinator/.claude
      volumes:
        - name: claude-config
          hostPath:
            path: /var/runinator/claude
            type: DirectoryOrCreate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-waker
  namespace: runinator
spec:
  template:
    spec:
      containers:
        - name: waker
          volumeMounts:
            - name: claude-config
              mountPath: /home/runinator/.claude
      volumes:
        - name: claude-config
          hostPath:
            path: /var/runinator/claude
            type: DirectoryOrCreate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runinator-ws
  namespace: runinator
spec:
  template:
    spec:
      containers:
        - name: ws
          volumeMounts:
            - name: claude-config
              mountPath: /home/runinator/.claude
      volumes:
        - name: claude-config
          hostPath:
            path: /var/runinator/claude
            type: DirectoryOrCreate
